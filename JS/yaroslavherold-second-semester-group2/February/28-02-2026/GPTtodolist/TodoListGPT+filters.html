<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JS ToDo - Function Power</title>
    <style>
        .completed { color: gray;}
    </style>
</head>
<body>

    <h2>ToDo List</h2>
    
    <input type="text" id="todo-input" placeholder="Что нужно сделать?">
    <select id="todo-priority">
        <option value="low">Низкая</option>
        <option value="medium">Средняя</option>
        <option value="high">Высокая</option>
    </select>
    <button id="add-btn">Добавить</button>

    <hr>

    <div>
        <strong>Фильтр:</strong>
        <button onclick="setFilter('all')">Все</button>
        <button onclick="setFilter('completed')">Выполненные</button>
        <button onclick="setFilter('active')">Не выполненные</button>
    </div>
    сортировка - по приоритету задач
    <ul id="todo-list"></ul>

    <script src="todoListGPT+filters.js"></script>
</body>
</html>
